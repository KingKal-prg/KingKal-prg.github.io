<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Web Proxy</title>
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <script src="particles.js"></script>
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <style>
         body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0d0d0d;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
         }

         /* Particles background */
         canvas#canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
         }

         /* Form styling */
         #uv-form {
            margin-top: 100px;
         }

         input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            outline: none;
            background: #1a1a1a;
            color: white;
         }

         input::placeholder {
            color: gray;
         }

         /* Footer */
         #footer {
            margin-top: 30px;
            font-size: 14px;
            color: gray;
         }
      </style>
   </head>
   <body>
      <canvas id="canvas"></canvas>

      <h1>Kelvin's Arcade</h1>
      <p>Enter a URL to unblock websites:</p>

      <form id="uv-form">
         <input id="uv-address" type="text" placeholder="Enter URL and press Enter" class="form__input"/>
      </form>

      <script src="uv/uv.bundle.js" charset="UTF-8" defer></script>
      <script src="uv/uv.config.js" charset="UTF-8" defer></script>
      <script src="register-sw.js" charset="UTF-8" defer></script>
      <script src="search.js" charset="UTF-8" defer></script>
      <script src="index.js" charset="UTF-8" defer></script>

      <div id="footer">
         <footer>©Kelvin 2024 Web Proxy - Use responsibly.</footer>
      </div>
   </body>
</html>
