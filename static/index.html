        /* Custom CSS for black theme */
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0d0d0d;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #uv-form {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }

        #uv-address {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #222;
            color: white;
            text-align: center;
        }

        #uv-address:focus {
            outline: none;
            border-color: #00aaff;
        }

        #header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        #header h1 {
            margin: 0;
            font-size: 24px;
            font-family: 'Arial', sans-serif;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #content {
            text-align: center;
            padding: 20px;
            margin-top: -4%;
        }

        #content h1 {
            font-size: 24px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Open Sans', sans-serif;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #searchbar {
            text-align: center;
            margin: 20px auto;
        }

        .form__input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            width: 300px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            background-color: #222;
            text-align: center;
            color: #fff;
            cursor: cell;
        }

        a {
            text-decoration: none;
            color: white;
            width: 50px;
            height: 50px;
            padding-right: 1px;
            padding-left: 1px;
            text-align: center;
            align-self: center;
        }

        .form__input::placeholder {
            color: #aaa;
            text-align: center;
        }

        .form_input:hover {
            cursor: cell;
        }

            outline: none;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
