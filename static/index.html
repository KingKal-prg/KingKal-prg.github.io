<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Unblocker</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script src="particles.js"></script> <!-- Link to particles.js -->
   </head>
   <body>
      <canvas id="particles-js"></canvas> <!-- Particles background -->

      <div id="content">
         <form id="uv-form">
            <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Type URL or search query" class="form__input"/>
         </form>

         <div id="popularSites">
            <img src="https://img.icons8.com/?size=100&id=T2CwYFr5ouk6&format=png&color=000000" alt="Xbox" class="hidden" onclick="autofill('http://xbox.com/play')">
            <img src="https://img.icons8.com/?size=100&id=48137&format=png&color=000000" alt="Now.gg" class="hidden" onclick="autofill('https://now.gg/')">
            <img src="https://img.icons8.com/?size=100&id=48166&format=png&color=000000" alt="Google" class="hidden" onclick="autofill('https://google.com')">
            <img src="https://img.icons8.com/?size=100&id=92582&format=png&color=000000" alt="GeForce NOW" class="hidden" onclick="autofill('https://play.geforcenow.com/')">
         </div>
      </div>

      <script src="uv/uv.bundle.js" defer></script>
      <script src="uv/uv.config.js" defer></script>
      <script src="search.js" defer></script>
      <script src="index.js" defer></script>
   </body>
</html>
